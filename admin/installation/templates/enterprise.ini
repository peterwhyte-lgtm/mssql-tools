; ============================================================
; SQL Server Enterprise Edition — Production Server
; Features: Engine + Agent + FullText + IS
; Paths: separated data/log/tempdb drives (edit per environment)
; Service accounts: domain service accounts (edit before use)
; ============================================================

[OPTIONS]

ACTION                       = "Install"
QUIET                        = "True"
IACCEPTSQLSERVERLICENSETERMS = "True"

; Enterprise features
FEATURES                     = SQLENGINE,SQLAGENT,FULLTEXT,IS

INSTANCENAME                 = "MSSQLSERVER"
INSTANCEDIR                  = "C:\Program Files\Microsoft SQL Server"
SQLCOLLATION                 = "SQL_Latin1_General_CP1_CI_AS"

; Windows auth only for production
SECURITYMODE                 = "Windows"

; Replace with your domain service accounts
SQLSVCACCOUNT                = "DOMAIN\svc_sqlengine"
; SQLSVCPASSWORD             = ""    managed externally
AGTSVCACCOUNT                = "DOMAIN\svc_sqlagent"
; AGTSVCPASSWORD             = ""    managed externally
SQLSVCSTARTUPTYPE            = "Automatic"
AGTSVCSTARTUPTYPE            = "Automatic"

; SSIS service account
ISSVCACCOUNT                 = "DOMAIN\svc_ssis"
ISSVCSTARTUPTYPE             = "Automatic"

TCPENABLED                   = 1
NPENABLED                    = 0
BROWSERSVCSTARTUPTYPE        = "Disabled"

; Separated drives — edit paths to match your disk layout
INSTALLSQLDATADIR            = "E:\SQLData\SystemDBs"
SQLUSERDBDIR                 = "E:\SQLData\UserDBs"
SQLUSERDBLOGDIR              = "F:\SQLLogs\UserLogs"
SQLTEMPDBDIR                 = "G:\TempDB\Data"
SQLTEMPDBLOGDIR              = "G:\TempDB\Logs"

; TempDB — set FILECOUNT to match logical CPU count (max 8)
SQLTEMPDBFILECOUNT           = 8
SQLTEMPDBFILESIZE            = 1024
SQLTEMPDBFILEGROWTH          = 512
SQLTEMPDBLOGFILESIZE         = 512
SQLTEMPDBLOGFILEGROWTH       = 256
