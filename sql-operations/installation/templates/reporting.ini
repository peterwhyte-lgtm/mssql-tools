; ============================================================
; SQL Server with Reporting Services (SSRS)
; Features: Engine + Agent + Reporting Services
; Note: SSRS config is done via Reporting Services Configuration Manager
;       after installation — this installs the binaries only.
; Note: From SQL 2017+ SSRS is a separate download/installer.
;       This template applies to SQL 2016 SP1 and earlier where
;       SSRS is bundled with the SQL Server installer.
; ============================================================

[OPTIONS]

ACTION                       = "Install"
QUIET                        = "True"
IACCEPTSQLSERVERLICENSETERMS = "True"

; Reporting Services — install only (configure separately)
FEATURES                     = SQLENGINE,SQLAGENT,RS

; RS install mode: FilesOnlyMode skips auto-config (recommended for manual setup)
RSINSTALLMODE                = "FilesOnlyMode"

INSTANCENAME                 = "MSSQLSERVER"
INSTANCEDIR                  = "C:\Program Files\Microsoft SQL Server"
SQLCOLLATION                 = "SQL_Latin1_General_CP1_CI_AS"

SECURITYMODE                 = "SQL"
; SAPWD supplied at runtime

SQLSVCACCOUNT                = "NT Service\MSSQLSERVER"
AGTSVCACCOUNT                = "NT Service\SQLSERVERAGENT"
SQLSVCSTARTUPTYPE            = "Automatic"
AGTSVCSTARTUPTYPE            = "Automatic"
RSSVCACCOUNT                 = "NT Service\ReportServer"
RSSVCSTARTUPTYPE             = "Automatic"

TCPENABLED                   = 1
NPENABLED                    = 0
BROWSERSVCSTARTUPTYPE        = "Disabled"

INSTALLSQLDATADIR            = "C:\SQLData\SystemDBs"
SQLUSERDBDIR                 = "C:\SQLData\UserDBs"
SQLUSERDBLOGDIR              = "C:\SQLLogs\UserLogs"
SQLTEMPDBDIR                 = "C:\SQLData\SystemDBs\TempDB"
SQLTEMPDBLOGDIR              = "C:\SQLLogs\SystemLogs\TempDB"

SQLTEMPDBFILECOUNT           = 4
SQLTEMPDBFILESIZE            = 8
SQLTEMPDBFILEGROWTH          = 64
SQLTEMPDBLOGFILESIZE         = 8
SQLTEMPDBLOGFILEGROWTH       = 64
