; ============================================================
; SQL Server Developer Edition — Local Dev Machine
; Features: Engine + Agent + FullText + SDK
; Paths: local drives, single data directory, minimal TempDB
; ============================================================

[OPTIONS]

ACTION                       = "Install"
QUIET                        = "True"
IACCEPTSQLSERVERLICENSETERMS = "True"

; Developer edition — full feature set, not for production
FEATURES                     = SQLENGINE,SQLAGENT,FULLTEXT,SDK

INSTANCENAME                 = "MSSQLSERVER"
INSTANCEDIR                  = "C:\Program Files\Microsoft SQL Server"
SQLCOLLATION                 = "SQL_Latin1_General_CP1_CI_AS"

; Mixed mode auth — useful for dev/test scenarios
SECURITYMODE                 = "SQL"
; SAPWD supplied at runtime

; Virtual accounts for dev machine
SQLSVCACCOUNT                = "NT Service\MSSQLSERVER"
AGTSVCACCOUNT                = "NT Service\SQLSERVERAGENT"
SQLSVCSTARTUPTYPE            = "Automatic"
AGTSVCSTARTUPTYPE            = "Automatic"

TCPENABLED                   = 1
NPENABLED                    = 1
BROWSERSVCSTARTUPTYPE        = "Automatic"

; Simplified paths for dev — single drive
INSTALLSQLDATADIR            = "C:\SQLData"
SQLUSERDBDIR                 = "C:\SQLData\UserDBs"
SQLUSERDBLOGDIR              = "C:\SQLData\UserLogs"
SQLTEMPDBDIR                 = "C:\SQLData\TempDB"
SQLTEMPDBLOGDIR              = "C:\SQLData\TempDB"

; Minimal TempDB for dev
SQLTEMPDBFILECOUNT           = 2
SQLTEMPDBFILESIZE            = 8
SQLTEMPDBFILEGROWTH          = 64
SQLTEMPDBLOGFILESIZE         = 8
SQLTEMPDBLOGFILEGROWTH       = 64
