; ============================================================
; SQL Server Unattended Install — Answer File Template
; Used with Install-SqlServer.ps1 -AnswerFile <path>
;
; SAPassword and SQLSYSADMINACCOUNTS are passed on the
; command line by the PS1 wrapper — do NOT store them here.
; ============================================================

[OPTIONS]

; Core action
ACTION                      = "Install"
QUIET                       = "True"
QUIETSIMPLE                 = "False"
IACCEPTSQLSERVERLICENSETERMS = "True"

; Features — SQLENGINE + SQL Agent (add SSMS,RS,IS as needed)
FEATURES                    = SQLENGINE,SQLAGENT

; Instance
INSTANCENAME                = "MSSQLSERVER"
INSTANCEDIR                 = "C:\Program Files\Microsoft SQL Server"

; Collation
SQLCOLLATION                = "SQL_Latin1_General_CP1_CI_AS"

; Authentication — Mixed mode. SAPWD supplied at runtime.
SECURITYMODE                = "SQL"

; Service accounts — virtual accounts, no password needed
SQLSVCACCOUNT               = "NT Service\MSSQLSERVER"
AGTSVCACCOUNT               = "NT Service\SQLSERVERAGENT"
SQLSVCSTARTUPTYPE           = "Automatic"
AGTSVCSTARTUPTYPE           = "Automatic"

; Network — TCP enabled, named pipes off, browser disabled
TCPENABLED                  = 1
NPENABLED                   = 0
BROWSERSVCSTARTUPTYPE       = "Disabled"

; Data directories — edit per environment
INSTALLSQLDATADIR           = "C:\SQLData\SystemDBs"
SQLUSERDBDIR                = "C:\SQLData\UserDBs"
SQLUSERDBLOGDIR             = "C:\SQLLogs\UserLogs"
SQLTEMPDBDIR                = "C:\SQLData\SystemDBs\TempDB"
SQLTEMPDBLOGDIR             = "C:\SQLLogs\SystemLogs\TempDB"

; TempDB — adjust FILECOUNT to match logical CPU count (cap 8)
SQLTEMPDBFILECOUNT          = 4
SQLTEMPDBFILESIZE           = 8
SQLTEMPDBFILEGROWTH         = 64
SQLTEMPDBLOGFILESIZE        = 8
SQLTEMPDBLOGFILEGROWTH      = 64

; ── Environment-specific overrides (uncomment and edit) ──────────────────────
; Named instance example:
; INSTANCENAME               = "SQL2022"

; Custom service account:
; SQLSVCACCOUNT              = "DOMAIN\svc_sqlengine"
; SQLSVCPASSWORD             = ""     ; leave blank — prompt or manage externally

; Additional features:
; FEATURES                   = SQLENGINE,SQLAGENT,FULLTEXT,IS
