name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Default: no permissions. Each job declares only what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ps-analyze:
    name: PowerShell Lint
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: pwsh
      - name: Run PSScriptAnalyzer
        run: |
          $paths = @('powershell','wrappers','helpers','sql-operations','tools') |
                   Where-Object { Test-Path $_ }
          if ($paths.Count -eq 0) { Write-Host "No PS paths found."; exit 0 }
          # Excluded rules — intentional for this repo:
          #   PSAvoidUsingWriteHost                — terminal DBA scripts; coloured output is by design
          #   PSAvoidUsingPlainTextForPassword     — SQL helpers; Windows auth preferred, SQL auth supported
          #   PSAvoidUsingUsernameAndPasswordParams — same reason
          #   PSUseBOMForUnicodeEncodedFile        — encoding controlled separately
          #   PSReviewUnusedParameter              — many params are conditionally used via env var fallbacks
          #   PSUseApprovedVerbs                   — internal helpers in web UI and migration scripts; not exported cmdlets
          #   PSUseShouldProcessForStateChangingFunctions — internal helper functions; not public API
          #   PSUseSingularNouns                   — internal function names; not exported cmdlets
          #   PSAvoidUsingEmptyCatchBlock          — intentional silent catches in web UI and collectors
          #   PSPossibleIncorrectComparisonWithNull — style preference; not a correctness issue here
          #   PSUseDeclaredVarsMoreThanAssignments — too noisy across orchestration scripts
          $exclude = @(
            'PSAvoidUsingWriteHost',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSUseBOMForUnicodeEncodedFile',
            'PSReviewUnusedParameter',
            'PSUseApprovedVerbs',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSUseSingularNouns',
            'PSAvoidUsingEmptyCatchBlock',
            'PSPossibleIncorrectComparisonWithNull',
            'PSUseDeclaredVarsMoreThanAssignments'
          )
          $results = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Severity Warning,Error -ExcludeRule $exclude
          }
          $results | Format-Table
          if ($results | Where-Object { $_.Severity -eq 'Error' }) { exit 1 }
        shell: pwsh

  markdown:
    name: Docs Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !blog/**/*.md
            !CLAUDE.md

  pester:
    name: Pester Tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
        shell: pwsh
      - name: Run Pester
        run: |
          if (-not (Test-Path 'tests')) { Write-Host 'No tests/ folder found.'; exit 0 }
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests'
          $cfg.Run.PassThru = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = 'pester-results.xml'
          $result = Invoke-Pester -Configuration $cfg
          if ($result.FailedCount -gt 0) { exit 1 }
        shell: pwsh

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
