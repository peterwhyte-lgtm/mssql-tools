name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Default: no permissions. Each job declares only what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ps-analyze:
    name: PowerShell Lint
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: pwsh
      - name: Run PSScriptAnalyzer
        run: |
          $paths = @('powershell','helpers','hybrid','sql-operations','collectors') |
                   Where-Object { Test-Path $_ }
          if ($paths.Count -eq 0) { Write-Host "No PS paths found."; exit 0 }
          # Excluded rules — intentional for this repo:
          #   PSAvoidUsingWriteHost                — terminal DBA scripts; coloured output is by design
          #   PSAvoidUsingPlainTextForPassword     — SQL helpers; Windows auth preferred, SQL auth supported
          #   PSAvoidUsingUsernameAndPasswordParams — same reason
          #   PSUseBOMForUnicodeEncodedFile        — encoding controlled separately
          #   PSReviewUnusedParameter              — many params are conditionally used via env var fallbacks
          $exclude = @(
            'PSAvoidUsingWriteHost',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSUseBOMForUnicodeEncodedFile',
            'PSReviewUnusedParameter'
          )
          $results = Invoke-ScriptAnalyzer -Path $paths -Recurse -Severity Warning,Error -ExcludeRule $exclude
          $results | Format-Table
          if ($results | Where-Object { $_.Severity -in 'Error','Warning' }) { exit 1 }
        shell: pwsh

  markdown:
    name: Docs Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
